  <!-- Modal novo benefício -->
  <div id="modalBeneficio" class="rb-modal-overlay" style="display:none" onclick="if(event.target===this)fecharModalBeneficio()">
    <div class="rb-modal" onclick="event.stopPropagation()">
      <h3>Novo Benefício</h3>
      <div class="form-group"><label for="bNome">Nome</label><input type="text" id="bNome" placeholder="Nome do benefício" /></div>
      <div class="form-group"><label for="bLink">Link (opcional)</label><input type="url" id="bLink" placeholder="https://..." /></div>
      <div class="form-group"><label for="bImagem">Imagem de capa (opcional)</label><input type="file" id="bImagem" accept="image/*" /></div>
      <div class="form-group"><label for="bPdf">Arquivo PDF (opcional)</label><input type="file" id="bPdf" accept="application/pdf" /></div>
      <div class="rb-modal-footer">
        <button type="button" class="rb-btn-cancel" onclick="fecharModalBeneficio()">Cancelar</button>
        <button type="button" class="btn" style="margin-top:0" onclick="salvarBeneficio()">Adicionar</button>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="data.js"></script>
  <script src="content.js"></script>
  <script>
    dbVerificarAcesso();
    (function () {
      var s = dbGetSessao(); var n = s ? s.nome : 'Colaborador';
      document.getElementById('userName').textContent = n;
      document.getElementById('userAvatar').textContent = n.charAt(0).toUpperCase();
      if (dbIsAdmin()) {
        document.getElementById('btnNovoBeneficio').style.display = '';
        document.querySelectorAll('.nav-admin-only').forEach(function(el) { el.style.display = ''; });
      }
    })();
    function logout() { dbEncerrarSessao(); }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderCustomBeneficios() {
      var lista = dbGetBeneficiosCustom();
      var grid  = document.getElementById('benefitGrid');
      // Remove previously injected custom cards
      grid.querySelectorAll('.benefit-card-custom').forEach(function(el) { el.remove(); });
      lista.forEach(function(b) {
        var wrapper = document.createElement('div');
        wrapper.className = 'benefit-card-custom';
        wrapper.style.position = 'relative';
        var href = b.pdf ? '#' : (b.link || '#');
        var target = b.link ? '_blank' : '_self';
        var imgHtml = b.imagem
          ? '<img src="' + escHtml(b.imagem) + '" alt="" style="width:100%;height:100%;object-fit:cover">'
          : '';
        var pdfIcon = b.pdf ? '<span style="position:absolute;bottom:36px;right:10px;background:rgba(234,83,57,.9);color:#fff;border-radius:6px;padding:3px 8px;font-size:10px;font-family:var(--fonte-secundaria);text-transform:uppercase;letter-spacing:.04em">PDF</span>' : '';
        var delBtn = dbIsAdmin()
          ? '<button onclick="excluirCustom(\'' + b.id + '\')" style="position:absolute;top:6px;right:6px;background:rgba(43,36,34,.7);color:#fff;border:none;border-radius:999px;padding:3px 10px;font-size:11px;cursor:pointer;z-index:2">Excluir</button>'
          : '';
        var clickHandler = b.pdf ? ' onclick="abrirPdf(\'' + b.id + '\');return false;"' : '';
        wrapper.innerHTML = delBtn + pdfIcon
          + '<a href="' + escHtml(href) + '" class="benefit-card" target="' + target + '"' + clickHandler + '>'
          + '<div class="benefit-card-image">' + imgHtml + '</div>'
          + '<span class="benefit-card-name">' + escHtml(b.nome) + '</span>'
          + '</a>';
        grid.appendChild(wrapper);
      });
    }

    function excluirCustom(id) {
      if (!confirm('Excluir este benefício?')) return;
      dbExcluirBeneficioCustom(id);
      renderCustomBeneficios();
    }

    function abrirModalBeneficio() { document.getElementById('modalBeneficio').style.display = 'flex'; }
    function fecharModalBeneficio() {
      document.getElementById('modalBeneficio').style.display = 'none';
      document.getElementById('bNome').value = '';
      document.getElementById('bLink').value = '';
      document.getElementById('bImagem').value = '';
      document.getElementById('bPdf').value = '';
    }

    function salvarBeneficio() {
      var nome    = document.getElementById('bNome').value.trim();
      var link    = document.getElementById('bLink').value.trim();
      var imgFile = document.getElementById('bImagem').files[0];
      var pdfFile = document.getElementById('bPdf').files[0];
      if (!nome) { alert('Informe o nome do benefício.'); return; }

      var imgB64 = '';
      var pdfB64 = '';
      var pending = 0;

      function finalizar() {
        dbCriarBeneficioCustom({ nome: nome, link: link, imagem: imgB64, pdf: pdfB64 });
        fecharModalBeneficio();
        renderCustomBeneficios();
      }

      function check() { pending--; if (pending <= 0) finalizar(); }

      if (imgFile) {
        if (imgFile.size > 2 * 1024 * 1024) { alert('Imagem máx 2MB.'); return; }
        pending++;
        var fr1 = new FileReader();
        fr1.onload = function(e) { imgB64 = e.target.result; check(); };
        fr1.readAsDataURL(imgFile);
      }
      if (pdfFile) {
        if (pdfFile.size > 5 * 1024 * 1024) { alert('PDF máx 5MB.'); return; }
        pending++;
        var fr2 = new FileReader();
        fr2.onload = function(e) { pdfB64 = e.target.result; check(); };
        fr2.readAsDataURL(pdfFile);
      }
      if (pending === 0) finalizar();
    }

    function abrirPdf(id) {
      var lista = dbGetBeneficiosCustom();
      var b = lista.find(function(x) { return x.id === id; });
      if (b && b.pdf) {
        var w = window.open('');
        w.document.write('<iframe src="' + b.pdf + '" style="width:100%;height:100%;border:none;position:fixed;inset:0"></iframe>');
        w.document.title = b.nome;
      }
    }

    renderCustomBeneficios();
  </script>
</body>
